name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: python -m pip install ruff==0.15.19
      - name: ruff check
        run: ruff check --output-format=github .
      - name: ruff format
        run: ruff format --check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements_test.txt
      - name: Prepare test env
        run: bash tests/setup.sh
      - name: Run tests
        run: |
          pytest -qq --timeout=30 --durations=10 -n auto \
            --cov=custom_components/alexa_media --cov-report=xml --cov-report=term
      - name: Upload coverage
        uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
