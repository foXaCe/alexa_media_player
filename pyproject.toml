[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear (likely bugs)
    "C4",   # flake8-comprehensions
    "LOG",  # flake8-logging
    "PERF", # perflint (performance anti-patterns)
    "PIE",  # flake8-pie (misc lints)
    "RUF",  # ruff-specific (mutable defaults, etc.)
]
# E501 (line length) is handled by the formatter. The ruleset is tightened
# incrementally; SIM/RET/TID are intentionally left out (TID bans the relative
# imports that custom components rely on; SIM/RET are stylistic and noisy here).
# UP047 (PEP 695 generics) is an invasive signature rewrite — intentionally relaxed.
ignore = ["E501", "UP047"]

[tool.ruff.lint.isort]
known-first-party = ["alexa_media", "tests"]
combine-as-imports = true
force-sort-within-sections = true

[tool.mypy]
python_version = "3.13"
# The historical code base is largely untyped; keep mypy non-blocking
# (matches the previous Poetry config) so CI stays green. Tighten incrementally.
ignore_errors = true
follow_imports = "silent"
ignore_missing_imports = true
warn_redundant_casts = true
warn_unused_configs = true

[tool.codespell]
skip = './.*,*.csv,*.json,*.lock'
quiet-level = 2
ignore-words-list = "hass"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
python_files = ["test_*.py", "*_tests.py"]
# Make the repo root importable (custom_components.*) when running bare `pytest`,
# matching how CI invokes it (no editable install / no `python -m`).
pythonpath = ["."]
addopts = "--cov=custom_components/alexa_media --cov-report=term-missing --cov-fail-under=90"
