# Check out https://pre-commit.com/ for documentation
minimum_pre_commit_version: 3.0.0
repos:
  # --- Ruff (lint + format, replaces black / isort / flake8 / pyupgrade) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # --- Built-in hooks ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-symlinks
      - id: check-case-conflict
      - id: fix-byte-order-marker
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: debug-statements
      - id: check-toml
      - id: check-json
        exclude: >
          (?x)^(
            .vscode/settings.json|
            .vscode/launch.json
          )$
      - id: check-yaml

  # --- Commit message linting ---
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.4
    hooks:
      - id: commitizen
        stages: ["commit-msg"]

  # --- Spelling ---
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli
        exclude_types: [csv, json]
        exclude: (^tests/fixtures/|CHANGELOG.md)

ci:
  autofix_commit_msg: |
    style: auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "build: pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false
