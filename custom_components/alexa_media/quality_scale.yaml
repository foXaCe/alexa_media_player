# Quality-scale self-assessment for this custom integration.
# Informative only (custom components cannot declare quality_scale in the
# manifest); tracked against the official rules as of 2026-07.
rules:
  # Bronze
  action-setup: done
  appropriate-polling: done
  brands: done
  common-modules: done
  config-flow: done
  config-flow-test-coverage: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data:
    status: todo
    comment: entry.runtime_data assigned and typed, but hass.data legacy store still authoritative.
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done
  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done
  # Gold
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: Amazon cloud service; devices are not locally discoverable.
  discovery-update-info:
    status: exempt
    comment: See discovery.
  dynamic-devices: done
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default:
    status: todo
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow:
    status: todo
    comment: Reauth flow exists; no SOURCE_RECONFIGURE step yet.
  repair-issues:
    status: done
    comment: deprecated_yaml_configuration issue via issue_registry.
  stale-devices: done
  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing:
    status: todo
    comment: mypy currently disabled (ignore_errors); incremental adoption planned.
